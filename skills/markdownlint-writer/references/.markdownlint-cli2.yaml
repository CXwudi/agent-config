# .markdownlint-cli2.yaml
config:
  default: true

  # 1. Line Length: Disabled because long URLs and tables are common.
  MD013: false

  # 2. Inline HTML: Enabled to allow custom styling like <br> or <u>.
  MD033: false

  # 3. First line H1: Disabled for files using YAML front matter or badges.
  MD041: false

  # 4. Multiple H1s: Allows multiple top-level headers (common in READMEs).
  MD025: false

# Files or directories to always ignore
ignores:
  - node_modules
  - CHANGELOG.md
  - .github
